# ============================================================
# SQL Master — Nginx Configuration for VPS Deployment
# ============================================================
# 
# SETUP INSTRUCTIONS:
# 1. Build the project:     npm run build
# 2. Copy dist/ to server:  scp -r dist/ user@your-vps:/var/www/sql-master/
# 3. Copy this file:        scp nginx.conf user@your-vps:/etc/nginx/sites-available/sql-master
# 4. Enable the site:       sudo ln -s /etc/nginx/sites-available/sql-master /etc/nginx/sites-enabled/
# 5. Test config:           sudo nginx -t
# 6. Reload Nginx:          sudo systemctl reload nginx
# 7. Setup SSL:             sudo certbot --nginx -d yourdomain.com
#
# Replace 'yourdomain.com' with your actual domain name.
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Root directory — point to your built dist/ folder
    root /var/www/sql-master/dist;
    index index.html;

    # ── SPA Fallback ──────────────────────────────────────────
    # All routes fall back to index.html (hash routing works anyway,
    # but this is essential if you ever switch to history-based routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────
    # Vite hashes asset filenames, so we can cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebAssembly ───────────────────────────────────────────
    # Ensure .wasm files are served with the correct MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Dataset & Data Files ──────────────────────────────────
    # Cache SQL datasets and lesson data (they rarely change)
    location /datasets/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /data/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Fonts & Icons ─────────────────────────────────────────
    location ~* \.(svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ──────────────────────────────────────
    # Reduces transfer size by ~60%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # ── Error Pages ───────────────────────────────────────────
    error_page 404 /index.html;

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/sql-master-access.log;
    error_log  /var/log/nginx/sql-master-error.log;
}

# ============================================================
# After running certbot, it will automatically add an HTTPS
# server block with SSL certificates. The config above will
# be modified to redirect HTTP → HTTPS.
#
# To setup SSL (free):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Certbot auto-renews via systemd timer. Verify with:
#   sudo certbot renew --dry-run
# ============================================================
