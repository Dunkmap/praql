<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.1875; // corner radius
  
  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#8b5cf6');
  
  // Rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Text
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  if (size <= 16) {
    ctx.font = `bold ${size * 0.5}px Arial`;
    ctx.fillText('S', size/2, size/2);
  } else {
    ctx.font = `800 ${size * 0.22}px Arial`;
    ctx.fillText('SQL', size/2, size * 0.4);
    ctx.font = `600 ${size * 0.13}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('MASTER', size/2, size * 0.65);
  }
}

[16, 48, 128].forEach(s => {
  const canvas = document.getElementById('c' + s);
  drawIcon(canvas, s);
  
  // Download link
  const link = document.createElement('a');
  link.download = `icon${s}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${s}x${s}`;
  document.body.appendChild(link);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
